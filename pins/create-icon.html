<!DOCTYPE html>
<html>
<head>
  <title>Icon Generator</title>
</head>
<body>
  <canvas id="canvas192" width="192" height="192"></canvas>
  <canvas id="canvas512" width="512" height="512"></canvas>
  
  <script>
    function createIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      const cornerRadius = size * 0.225;
      
      // Background gradient (green)
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#10b981');
      gradient.addColorStop(1, '#059669');
      ctx.fillStyle = gradient;
      
      // Rounded rectangle
      ctx.beginPath();
      ctx.moveTo(cornerRadius, 0);
      ctx.lineTo(size - cornerRadius, 0);
      ctx.quadraticCurveTo(size, 0, size, cornerRadius);
      ctx.lineTo(size, size - cornerRadius);
      ctx.quadraticCurveTo(size, size, size - cornerRadius, size);
      ctx.lineTo(cornerRadius, size);
      ctx.quadraticCurveTo(0, size, 0, size - cornerRadius);
      ctx.lineTo(0, cornerRadius);
      ctx.quadraticCurveTo(0, 0, cornerRadius, 0);
      ctx.closePath();
      ctx.fill();
      
      // Border
      ctx.strokeStyle = '#047857';
      ctx.lineWidth = size * 0.02;
      ctx.stroke();
      
      // Letter "A"
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${size * 0.6}px "SF Pro Display", -apple-system, BlinkMacSystemFont, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('A', size / 2, size * 0.48);
      
      // Year "2026"
      ctx.font = `${size * 0.13}px "SF Pro Display", -apple-system, BlinkMacSystemFont, sans-serif`;
      ctx.fillText('2026', size / 2, size * 0.82);
    }
    
    createIcon(document.getElementById('canvas192'), 192);
    createIcon(document.getElementById('canvas512'), 512);
    
    // Auto-download
    setTimeout(() => {
      const canvas192 = document.getElementById('canvas192');
      const canvas512 = document.getElementById('canvas512');
      
      canvas192.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'icon-192.png';
        a.click();
      });
      
      setTimeout(() => {
        canvas512.toBlob(blob => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'icon-512.png';
          a.click();
        });
      }, 500);
    }, 500);
  </script>
</body>
</html>
