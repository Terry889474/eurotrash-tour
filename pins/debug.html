<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug</title>
  <style>
    body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
    .error { background: #dc2626; padding: 10px; margin: 10px 0; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>Debug Page</h1>
  <div id="status">Checking...</div>
  <div id="errors"></div>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  
  <script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      document.getElementById('errors').innerHTML += '<div class="error">ERROR: ' + msg + ' at line ' + lineNo + '</div>';
      return false;
    };
    
    document.getElementById('status').innerHTML = 'React loaded: ' + (typeof React !== 'undefined') + '<br>' +
      'Firebase loaded: ' + (typeof firebase !== 'undefined') + '<br>' +
      'Babel loaded: ' + (typeof Babel !== 'undefined');
  </script>
  
  <script type="text/babel">
    const { useState } = React;
    
    function TestApp() {
      const [count, setCount] = useState(0);
      return (
        <div style={{background: '#059669', padding: '20px', marginTop: '20px', borderRadius: '8px'}}>
          <h2>React Test Working!</h2>
          <button onClick={() => setCount(count + 1)} style={{padding: '10px 20px', fontSize: '16px'}}>
            Clicked {count} times
          </button>
        </div>
      );
    }
    
    ReactDOM.render(<TestApp />, document.getElementById('root'));
    document.getElementById('status').innerHTML += '<br>React render attempted!';
  </script>
  
  <div id="root"></div>
</body>
</html>
